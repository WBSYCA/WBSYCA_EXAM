<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration Form PP-02</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
    }
    header img {
      max-width: 100%;
    }
    input[type="text"] {
      padding: 10px;
      width: 300px;
      font-size: 16px;
      text-transform: uppercase;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      background-color: #007acc;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #result {
      display: none;
      margin-top: 20px;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .label {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <img src="https://i.postimg.cc/vHvCqdhG/header.jpg" alt="Page Header Image" />
    <h1>Welcome to Student Registration Portal</h1>
  </header>

  <h2>Search Your Registration Details (PP-02)</h2>
  <input type="text" id="searchInput" placeholder="Enter Name or Roll No">
  <button onclick="searchData()">Search</button>
  <button onclick="window.location.href='index.html'">Back to Home</button>

  <div id="result"></div>

  <script>
    async function searchData() {
      const query = document.getElementById('searchInput').value.trim().toUpperCase();
      if (!query) return alert("Please enter a Name or Roll No.");

      const url = `https://script.google.com/macros/s/AKfycbx0D6F6-ePqT-_W7EYrZC_qx_VO3JLkfeTQk_qrPRoPvCTx-DHyMa0b2QmKGIgOJr_H9g/exec?query=${encodeURIComponent(query)}`;
      try {
        const res = await fetch(url);
        const data = await res.json();

        if (!data || data.length === 0) return alert("No record found.");

        const record = data[0];
        if ((record["STATUS"] || "").toUpperCase() === "MODIFIED") {
          alert("You have already modified your registration once.");
          return;
        }

        const dobParts = (record["DATE OF BIRTH"] || '').split("/");
        const [month, day, year] = dobParts;

        const params = new URLSearchParams({
          "entry.916188020": record["REGISTRATION NO"],
          "entry.1318237488": record["ROLL NO"],
          "entry.1970136733": record["APPLICANT NAME"],
          "entry.1915382959_month": month,
	  "entry.1915382959_day": day,
          "entry.1915382959_year": year,
          "entry.230391067": record["GUARDIAN NAME"],
          "entry.2141508289": record["RELATION"],
          "entry.91311027": record["CONTACT NO"],
          "entry.949717326": record["SUBJECT"],
          "entry.197254026": record["CENTRE NAME"],
          "entry.312317850": record["CENTRE CODE"],
          "entry.1273939207": record["CENTRE ADDRESS"]
        });

        const formURL = `https://docs.google.com/forms/d/e/1FAIpQLSfjghQImZGdJG4y6eskIVJt60aoGhGyGkVIQijmOCsNeFpPDw/viewform?usp=pp_url&${params.toString()}`;

        document.getElementById("result").style.display = "block";
        document.getElementById("result").innerHTML = `
          <p><span class="label">Name:</span> ${record["APPLICANT NAME"]}</p>
          <p><span class="label">Roll No:</span> ${record["ROLL NO"]}</p>
          <p><span class="label">Registration No:</span> ${record["REGISTRATION NO"]}</p>
          <button onclick="window.location.href='${formURL}'">Modify My Details</button>
        `;
      } catch (error) {
        alert("Error fetching data. Try again later.");
        console.error(error);
      }
    }
  </script>
</body>
</html>
