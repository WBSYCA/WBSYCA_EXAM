 <pp02.html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration Form PP-02</title>
  <link rel="icon" type="image/png" href="wbsyca_logo.png">
  <style>
    input[type="text"], textarea { text-transform: uppercase; }
    body { font-family: Arial; background: #f4f4f4; padding: 20px; text-align: center; }
    header img { max-width: 100%; height: auto; }
    input[type="text"] {
      padding: 10px; width: 300px; font-size: 16px; text-transform: uppercase;
    }
    button {
      padding: 10px 20px; margin: 10px; font-size: 16px;
      background-color: #007acc; color: white; border: none;
      border-radius: 5px; cursor: pointer;
    }
    #result {
      margin-top: 20px; background: #fff; padding: 20px;
      border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 600px; margin-left: auto; margin-right: auto; text-align: left;
    }
  </style>
</head>
<body>

<header>
  <img src="https://i.postimg.cc/vHvCqdhG/header.jpg" alt="Header" />
  <h1>Welcome to Student Registration Portal</h1>
</header>

<h2>Search Your Registration Details (PP-02)</h2>
<input type="text" id="searchInput" placeholder="Enter Roll No" />
<button onclick="searchData()">Search</button>

<div id="result" style="display: none;"></div>

<script>
  async function searchData() {
    const query = document.getElementById("searchInput").value.trim().toUpperCase();
    if (!query) return alert("Please enter a Roll No.");

    const url = "https://script.google.com/macros/s/AKfycby4hKsc2svkK8oqrLaD9WabkTGrJZnXupCZVk5SVGDy-Gg2kUtOCd2N7KQ4OPwMlqTg/exec?query=" + encodeURIComponent(query);

    try {
      const res = await fetch(url);
      const data = await res.json();
      const record = data[0];
      if (!record) return alert("No matching record found.");

      const dob = new Date(record["DATE OF BIRTH"]);
      const dobDay = dob.getDate();
      const dobMonth = dob.getMonth() + 1;
      const dobYear = dob.getFullYear();

      const formURL = "https://docs.google.com/forms/d/e/1jcCw4-TKI-RSAs8mSqVk6jxoPY3hTyBI7Pb0OKpSPWk/viewform?usp=pp_url" +
        `&entry.916188020=${encodeURIComponent(record["REGISTRATION NO"])}` +
        `&entry.1318237488=${encodeURIComponent(record["ROLL NO"])}` +
        `&entry.1970136733=${encodeURIComponent(record["APPLICANT NAME"])}` +
        `&entry.1915382959_day=${dobDay}` +
        `&entry.1915382959_month=${dobMonth}` +
        `&entry.1915382959_year=${dobYear}` +
        `&entry.230391067=${encodeURIComponent(record["GUARDIAN NAME"])}` +
        `&entry.2141508289=${encodeURIComponent(record["RELATION"])}` +
        `&entry.91311027=${encodeURIComponent(record["CONTACT NO"])}` +
        `&entry.949717326=${encodeURIComponent(record["SUBJECT"])}` +
        `&entry.197254026=${encodeURIComponent(record["CENTRE NAME"])}` +
        `&entry.312317850=${encodeURIComponent(record["CENTRE CODE"])}` +
        `&entry.1273939207=${encodeURIComponent(record["CENTRE ADDRESS"])}`;

      let buttons = "";
      if ((record["STATUS"] || "").toUpperCase() === "MODIFIED") {
        buttons = `<p style='color:red;'><b>You have already modified your registration once. Further changes are not allowed.</b></p>`;
      } else {
        buttons = `
          <button onclick="window.location.href='${formURL}'">📝 Modify My Details</button>
          <button onclick="approve('${record["ROLL NO"]}')">✅ Approve Without Changes</button>
        `;
      }

      document.getElementById("result").innerHTML = `
           <p><span class="label">Name:</span> ${record["APPLICANT NAME"] || "N/A"}</p>
          <p><span class="label">Roll No:</span> ${record["ROLL NO"] || "N/A"}</p>
          <p><span class="label">Registration No:</span> ${record["REGISTRATION NO"] || "N/A"}</p>
          <p><span class="label">DOB:</span> ${dobDay}/${dobMonth}/${dobYear}</p>
          <p><span class="label">Guardian Name:</span> ${record["GUARDIAN NAME"] || "N/A"}</p>
          <p><span class="label">Relation:</span> ${record["RELATION"] || 'N/A'}</p>
          <p><span class="label">Contact No:</span> ${record["CONTACT NO"] || 'N/A'}</p>
          <p><span class="label">Subject:</span> ${record["SUBJECT"] || 'N/A'}</p>
          <p><span class="label">Centre Name:</span> ${record["CENTRE NAME"] || "N/A"}</p>
          <p><span class="label">Centre Code:</span> ${record["CENTRE CODE"] || 'N/A'}</p>
          <p><span class="label">Centre Address:</span> ${record["CENTRE ADDRESS"] || 'N/A'}</p>
        ${buttons}
      `;
      document.getElementById("result").style.display = "block";
    } catch (err) {
      alert("Error fetching data.");
      console.error(err);
    }
  }

  async function approve(rollNo) {
    const url = "https://script.google.com/macros/s/AKfycby4hKsc2svkK8oqrLaD9WabkTGrJZnXupCZVk5SVGDy-Gg2kUtOCd2N7KQ4OPwMlqTg/exec";
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ rollNo })
    });
    const result = await res.text();
    if (result === "UPDATED") {
      alert("✅ Your data was approved successfully.");
      location.reload();
    } else {
      alert("❌ Approval failed: " + result);
    }
  }
</script>
</body>
</html>
